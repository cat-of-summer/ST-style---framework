name: ci

on:
  push:
    branches: ['**']
    tags-ignore: ['**']
  pull_request: {}

jobs:
  build:
    runs-on: ubuntu-latest

    environment: ${{ github.ref_name }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      CI_COMMAND:    ${{ vars.CI_COMMAND }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Run CI command
        if: ${{ env.CI_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$CI_COMMAND"

      - name: Nothing configured
        if: ${{ env.BUILD_COMMAND == '' && env.CI_COMMAND == '' }}
        run: echo "::warning::Neither BUILD_COMMAND nor CI_COMMAND is set for environment '${{ github.ref_name }}'; skipping checks"
