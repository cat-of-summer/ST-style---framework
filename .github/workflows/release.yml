name: release

on:
  create:

permissions:
  contents: write
  packages: write

jobs:
  get-branch:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.find-branch.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: find-branch
        run: |
          BRANCH=$(git branch -r --contains ${{ github.sha }} | grep -v HEAD | head -1 | sed 's/.*origin\///')
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

  release:
    needs: get-branch
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      RELEASE_FILES: ${{ vars.RELEASE_FILES }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Flatten release asset names
        id: stage
        if: ${{ env.RELEASE_FILES != '' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          out=".release-staging"
          rm -rf "$out"
          mkdir -p "$out"

          set -f
          # shellcheck disable=SC2206
          patterns=( ${RELEASE_FILES//,/ } )
          set +f

          staged=()
          for pattern in "${patterns[@]}"; do
            base="${pattern%%[*?[{]*}"
            eval "matches=( $pattern )"
            for f in "${matches[@]}"; do
              [ -f "$f" ] || continue
              rel="${f#"$base"}"
              if [ -z "$rel" ] || [ "$rel" = "$f" ]; then
                rel="$(basename "$f")"
              fi
              flat="${rel//\//__}"
              cp "$f" "$out/$flat"
              staged+=("$out/$flat")
            done
          done
          if [ ${#staged[@]} -eq 0 ]; then
            echo "No files matched RELEASE_FILES: $RELEASE_FILES" >&2
            exit 1
          fi
          printf 'Staged %s file(s):\n' "${#staged[@]}"
          printf '  %s\n' "${staged[@]}"
          {
            echo "files<<EOF"
            printf '%s\n' "${staged[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: get-branch
    if: ${{ vars.PUBLISH_TO_NPM == 'true' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://npm.pkg.github.com'

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
