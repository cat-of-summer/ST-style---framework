name: release

on:
  create:

permissions:
  contents: write
  packages: write

jobs:
  get-branch:
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.find-branch.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: find-branch
        run: |
          BRANCH=$(git branch -r --contains ${{ github.sha }} | grep -v HEAD | head -1 | sed 's/.*origin\///')
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT

  release:
    needs: get-branch
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    outputs:
      publish_to_npm: ${{ vars.PUBLISH_TO_NPM }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      RELEASE_FILES: ${{ vars.RELEASE_FILES }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Flatten release asset names
        id: stage
        if: ${{ env.RELEASE_FILES != '' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          out=".release-staging"
          rm -rf "$out"
          mkdir -p "$out"

          set -f
          # shellcheck disable=SC2206
          patterns=( ${RELEASE_FILES//,/ } )
          set +f

          staged=()
          for pattern in "${patterns[@]}"; do
            base="${pattern%%[*?[{]*}"
            eval "matches=( $pattern )"
            for f in "${matches[@]}"; do
              [ -f "$f" ] || continue
              rel="${f#"$base"}"
              if [ -z "$rel" ] || [ "$rel" = "$f" ]; then
                rel="$(basename "$f")"
              fi
              flat="${rel//\//__}"
              cp "$f" "$out/$flat"
              staged+=("$out/$flat")
            done
          done
          if [ ${#staged[@]} -eq 0 ]; then
            echo "No files matched RELEASE_FILES: $RELEASE_FILES" >&2
            exit 1
          fi
          printf 'Staged %s file(s):\n' "${#staged[@]}"
          printf '  %s\n' "${staged[@]}"
          {
            echo "files<<EOF"
            printf '%s\n' "${staged[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: [get-branch, release]
    if: ${{ needs.release.outputs.publish_to_npm == 'true' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.branch }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          registry-url: 'https://npm.pkg.github.com'

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Override npm auth for publish
        run: sed -i 's|//npm.pkg.github.com/:_authToken=.*|//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}|' .npmrc

      - name: Set version from tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v([0-9]+(\.[0-9]+)*)$ ]]; then
            echo "::error::Tag '$TAG' is not a version tag (expected v#, v#.#, v#.#.#)." >&2
            exit 1
          fi
          NUM="${BASH_REMATCH[1]}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NUM"
          VERSION="${MAJOR:-0}.${MINOR:-0}.${PATCH:-0}"
          echo "Tag $TAG -> package version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - run: npm publish
