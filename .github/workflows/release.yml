name: release

on:
  push:
    tags:
      - 'v*'
      - '**/v*'
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  checks: read

jobs:
  await-ci:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI (ci-cd workflow)
        uses: lewagon/wait-on-check-action@v1.8.0
        with:
          ref: ${{ github.ref }}
          check-regexp: '^ci$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          allowed-conclusions: success,skipped
          wait-interval: 15
          fail-on-no-checks: false

  prepare:
    needs: [await-ci]
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      branch: ${{ steps.find-branch.outputs.branch }}
      pkg_suffix: ${{ steps.find-branch.outputs.pkg_suffix }}
    steps:
      - name: Resolve & validate tag
        id: resolve
        shell: bash
        env:
          MULTIPLE_PACKAGES: ${{ vars.MULTIPLE_PACKAGES }}
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::Запускать нужно на теге: Run workflow → выбрать тег vX.Y.Z." >&2
            exit 1
          fi
          FULL_TAG="${{ github.ref_name }}"
          if [[ "$FULL_TAG" == */* ]]; then
            BRANCH_EXPLICIT="${FULL_TAG%/*}"
            VER_TAG="${FULL_TAG##*/}"
          else
            BRANCH_EXPLICIT=""
            VER_TAG="$FULL_TAG"
          fi
          if [[ ! "$VER_TAG" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::Tag '$VER_TAG' is not a v-version tag (expected v#, v#.#, v#.#.#)." >&2
            exit 1
          fi
          if [ "${MULTIPLE_PACKAGES:-}" = "true" ]; then
            if [ -z "$BRANCH_EXPLICIT" ]; then
              echo "::error::MULTIPLE_PACKAGES=true: тег обязан быть в форме '{branch}/vX.Y.Z' (got '$FULL_TAG')." >&2
              exit 1
            fi
          else
            if [ -n "$BRANCH_EXPLICIT" ]; then
              echo "::error::MULTIPLE_PACKAGES выключен: тег обязан быть в форме 'vX.Y.Z' без префикса ветки (got '$FULL_TAG'). Включите MULTIPLE_PACKAGES=true для тегов '{branch}/vX.Y.Z'." >&2
              exit 1
            fi
          fi
          echo "Resolved tag: $FULL_TAG (version: $VER_TAG, branch: ${BRANCH_EXPLICIT:-auto})"
          echo "ref=$FULL_TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$VER_TAG" >> "$GITHUB_OUTPUT"
          echo "branch_explicit=$BRANCH_EXPLICIT" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve.outputs.ref }}
      - id: find-branch
        env:
          MULTIPLE_PACKAGES: ${{ vars.MULTIPLE_PACKAGES }}
        run: |
          EXPLICIT="${{ steps.resolve.outputs.branch_explicit }}"
          if [ -n "$EXPLICIT" ]; then
            if ! git ls-remote --exit-code --heads origin "$EXPLICIT" >/dev/null 2>&1; then
              echo "::error::Branch '$EXPLICIT' from tag '${{ steps.resolve.outputs.ref }}' not found." >&2
              exit 1
            fi
            REAL_BRANCH="$EXPLICIT"
          else
            REAL_BRANCH=$(git branch -r --contains "${{ github.sha }}" | grep -v HEAD | head -1 | sed 's#.*origin/##' | tr -d '[:space:]')
          fi
          BRANCH="${REAL_BRANCH//\//-}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          if [ "${MULTIPLE_PACKAGES:-}" = "true" ]; then
            echo "pkg_suffix=-${BRANCH}" >> "$GITHUB_OUTPUT"
          else
            echo "pkg_suffix=" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: prepare
    runs-on: ubuntu-latest

    environment: ${{ needs.prepare.outputs.branch }}

    outputs:
      publish_method: ${{ vars.PUBLISH_METHOD }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      RELEASE_FILES: ${{ vars.RELEASE_FILES }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Flatten release asset names
        id: stage
        if: ${{ env.RELEASE_FILES != '' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          out=".release-staging"
          rm -rf "$out"
          mkdir -p "$out"

          set -f
          # shellcheck disable=SC2206
          patterns=( ${RELEASE_FILES//,/ } )
          set +f

          staged=()
          for pattern in "${patterns[@]}"; do
            base="${pattern%%[*?[{]*}"
            eval "matches=( $pattern )"
            for f in "${matches[@]}"; do
              [ -f "$f" ] || continue
              rel="${f#"$base"}"
              if [ -z "$rel" ] || [ "$rel" = "$f" ]; then
                rel="$(basename "$f")"
              fi
              flat="${rel//\//__}"
              cp "$f" "$out/$flat"
              staged+=("$out/$flat")
            done
          done
          if [ ${#staged[@]} -eq 0 ]; then
            echo "No files matched RELEASE_FILES: $RELEASE_FILES" >&2
            exit 1
          fi
          printf 'Staged %s file(s):\n' "${#staged[@]}"
          printf '  %s\n' "${staged[@]}"
          {
            echo "files<<EOF"
            printf '%s\n' "${staged[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.ref }}
          name: ${{ needs.prepare.outputs.pkg_suffix != '' && format('{0} release {1}', needs.prepare.outputs.branch, needs.prepare.outputs.tag) || format('Release {0}', needs.prepare.outputs.tag) }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    needs: [prepare, release]
    if: ${{ needs.release.outputs.publish_method == 'npm' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.prepare.outputs.branch }}

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Drop committed .npmrc
        shell: bash
        run: |
          set -euo pipefail
          rm -f .npmrc

      - name: Set version from tag
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v([0-9]+(\.[0-9]+)*)$ ]]; then
            echo "::error::Tag '$TAG' is not a version tag (expected v#, v#.#, v#.#.#)." >&2
            exit 1
          fi
          NUM="${BASH_REMATCH[1]}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$NUM"
          VERSION="${MAJOR:-0}.${MINOR:-0}.${PATCH:-0}"
          echo "Tag $TAG -> package version $VERSION"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Apply per-branch package name
        if: ${{ needs.prepare.outputs.pkg_suffix != '' }}
        shell: bash
        env:
          SUFFIX: ${{ needs.prepare.outputs.pkg_suffix }}
        run: |
          set -euo pipefail
          NAME=$(node -p "require('./package.json').name")
          echo "MULTIPLE_PACKAGES: $NAME -> ${NAME}${SUFFIX}"
          npm pkg set name="${NAME}${SUFFIX}"

      - name: Setup Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@${{ github.repository_owner }}'

      - name: Publish to GitHub Packages
        id: gpr
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_PRIVATE: ${{ github.event.repository.private }}
        run: |
          set -euo pipefail
          if [ "$REPO_PRIVATE" = "true" ]; then ACCESS="restricted"; else ACCESS="public"; fi
          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          URL="https://npm.pkg.github.com"
          npm pkg delete publishConfig.registry >/dev/null 2>&1 || true
          if npm view "$PKG@$VERSION" version --registry "$URL" >/dev/null 2>&1; then
            echo "$PKG@$VERSION уже есть в GitHub Packages — пропускаем"
          else
            echo "npm publish --registry $URL --access $ACCESS"
            if ! npm publish --registry "$URL" --access "$ACCESS"; then
              echo "::group::npm debug log"
              cat "$(ls -t ~/.npm/_logs/*-debug-*.log 2>/dev/null | head -1)" 2>/dev/null || echo "(debug-лог не найден)"
              echo "::endgroup::"
              exit 1
            fi
          fi

      - name: Setup Node for npmjs.org
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@${{ github.repository_owner }}'

      - name: Ensure npm CLI supports trusted publishing
        shell: bash
        run: npm install -g npm@latest

      - name: Publish to npmjs.org
        id: npmjs
        continue-on-error: true
        shell: bash
        env:
          REPO_PRIVATE: ${{ github.event.repository.private }}
        run: |
          set -euo pipefail
          if [ "$REPO_PRIVATE" = "true" ]; then ACCESS="restricted"; else ACCESS="public"; fi
          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          URL="https://registry.npmjs.org"
          if npm view "$PKG@$VERSION" version --registry "$URL" >/dev/null 2>&1; then
            echo "$PKG@$VERSION уже есть в npmjs.org — пропускаем"
          else
            echo "npm publish --registry $URL --access $ACCESS (trusted publishing / OIDC)"
            npm publish --registry "$URL" --access "$ACCESS"
          fi

  docker-publish:
    needs: [prepare, release]
    if: ${{ needs.release.outputs.publish_method == 'docker' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.prepare.outputs.branch }}

    env:
      DOCKER_REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
      DOCKER_IMAGE: ${{ vars.DOCKER_IMAGE || github.repository }}
      DOCKERFILE_PATH: ${{ vars.DOCKERFILE_PATH || './Dockerfile' }}
      BUILD_CONTEXT: ${{ vars.BUILD_CONTEXT || '.' }}
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Validate Dockerfile
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$DOCKERFILE_PATH" ]; then
            echo "::error::Dockerfile not found at '$DOCKERFILE_PATH'. The docker publish method requires a Dockerfile (set DOCKERFILE_PATH to override the default ./Dockerfile)." >&2
            exit 1
          fi

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Resolve image ref & version
        id: meta
        shell: bash
        env:
          SUFFIX: ${{ needs.prepare.outputs.pkg_suffix }}
          BRANCH: ${{ needs.prepare.outputs.branch }}
        run: |
          set -euo pipefail
          IMG="${DOCKER_IMAGE}${SUFFIX}"
          IMAGE="$(echo "${DOCKER_REGISTRY}/${IMG}" | tr '[:upper:]' '[:lower:]')"

          TAG="${{ needs.prepare.outputs.tag }}"
          if [[ ! "$TAG" =~ ^v?([0-9]+(\.[0-9]+)*)$ ]]; then
            echo "::error::Tag '$TAG' is not a version tag (expected v#, v#.#, v#.#.#)." >&2
            exit 1
          fi
          VERSION="${BASH_REMATCH[1]}"

          echo "Image: $IMAGE"
          echo "Version: $VERSION"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:latest"
            if [ -z "$SUFFIX" ]; then
              echo "${IMAGE}:${BRANCH}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ vars.DOCKER_USERNAME || github.actor }}
          password: ${{ secrets.DOCKER_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GH_TOKEN=${{ secrets.PAT_TOKEN }}
            VERSION=${{ steps.meta.outputs.sha_short }}
            ENVIRONMENT=${{ needs.prepare.outputs.branch }}
            ${{ vars.DOCKER_BUILD_ARGS }}

  packagist-publish:
    needs: [prepare, release]
    if: ${{ needs.release.outputs.publish_method == 'packagist' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.prepare.outputs.branch }}

    steps:
      - name: Publish to Packagist (update; create on first publish)
        shell: bash
        env:
          PACKAGIST_USERNAME: ${{ vars.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail

          update_code=$(curl -sS -o /tmp/packagist.out -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -d "{\"repository\":{\"url\":\"${REPO_URL}\"}}")

          if [ "$update_code" -ge 200 ] && [ "$update_code" -lt 300 ]; then
            echo "Packagist: пакет обновлён."
            cat /tmp/packagist.out; echo
            exit 0
          fi

          if [ "$update_code" != "404" ]; then
            echo "::error::Packagist update failed (HTTP $update_code)"
            cat /tmp/packagist.out; echo
            exit 1
          fi

          echo "Packagist: пакет не найден, создаю (первая публикация)…"
          create_code=$(curl -sS -o /tmp/packagist.out -w '%{http_code}' -X POST \
            -H 'Content-Type: application/json' \
            -H "Authorization: Bearer ${PACKAGIST_USERNAME}:${PACKAGIST_API_TOKEN}" \
            https://packagist.org/api/create-package \
            -d "{\"repository\":\"${REPO_URL}\"}")

          if [ "$create_code" -ge 200 ] && [ "$create_code" -lt 300 ]; then
            echo "Packagist: пакет создан."
            cat /tmp/packagist.out; echo
          else
            echo "::error::Packagist create failed (HTTP $create_code) — нужен MAIN API-токен."
            cat /tmp/packagist.out; echo
            exit 1
          fi
