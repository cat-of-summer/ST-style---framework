name: ci/cd

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request: {}
  workflow_dispatch:
    inputs:
      commits:
        description: 'Comma-separated commits to deploy'
        required: false
        type: string
        default: ''
      deploy_mirror:
        description: 'false=delete nothing; true=delete only files removed in deployed commits (selective); full=exact mirror sync (rsync/lftp --delete, git reset --hard) — wipes untracked files on server'
        required: false
        type: string
        default: 'false'

permissions:
  contents: read
  checks: read
  statuses: read

jobs:

  get-branch:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
    steps:
      - name: Checkout
        if: ${{ github.ref_type == 'tag' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve environment
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            BRANCH=$(git branch -r --contains "${{ github.sha }}" | grep -v HEAD | head -1 | sed 's#.*origin/##' | tr -d '[:space:]')
          else
            BRANCH="${{ github.ref_name }}"
          fi
          echo "Environment resolved to: '$BRANCH'"
          echo "environment=$BRANCH" >> "$GITHUB_OUTPUT"

  gate:
    needs: get-branch
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.environment }}

    outputs:
      run_ci: ${{ steps.decide.outputs.run_ci }}
      run_cd: ${{ steps.decide.outputs.run_cd }}
      scope: ${{ steps.decide.outputs.scope }}
      commits: ${{ steps.decide.outputs.commits }}

    env:
      ACTION_TRIGGER: ${{ vars.ACTION_TRIGGER || 'DISPATCH' }}
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      CI_COMMAND: ${{ vars.CI_COMMAND }}
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DEPLOY_METHOD: ${{ vars.DEPLOY_METHOD || 'COMMAND' }}
      DEPLOY_LAST_COMMITS: ${{ vars.DEPLOY_LAST_COMMITS || 'false' }}

    steps:
      - name: Decide what to run
        id: decide
        shell: bash
        env:
          EVENT: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_COMMITS: ${{ inputs.commits }}
          PUSH_COMMITS: ${{ join(github.event.commits.*.id, ',') }}
        run: |
          set -euo pipefail

          ACTIVE=false
          PR=false
          case "$EVENT" in
            workflow_dispatch) ACTIVE=true ;;
            pull_request)      PR=true ;;
            push)
              if [ "$REF_TYPE" = "branch" ] && [ "$ACTION_TRIGGER" = "PUSH" ];    then ACTIVE=true; fi
              if [ "$REF_TYPE" = "tag" ]    && [ "$ACTION_TRIGGER" = "RELEASE" ]; then ACTIVE=true; fi
              ;;
          esac

          HAVE_CI=false
          if [ -n "${BUILD_COMMAND:-}" ] || [ -n "${CI_COMMAND:-}" ]; then HAVE_CI=true; fi

          HAVE_CD=false
          if [ -n "${DEPLOY_HOST:-}" ] && [ -n "${DEPLOY_USER:-}" ] && [ -n "${DEPLOY_KEY:-}" ] && [ -n "${DEPLOY_PATH:-}" ]; then
            HAVE_CD=true
          fi

          RUN_CI=false
          RUN_CD=false
          if [ "$PR" = "true" ]; then
            [ "$HAVE_CI" = "true" ] && RUN_CI=true || true
          elif [ "$ACTIVE" = "true" ]; then
            [ "$HAVE_CI" = "true" ] && RUN_CI=true || true
            [ "$HAVE_CD" = "true" ] && RUN_CD=true || true
          fi

          SCOPE=""
          COMMITS=""
          if [ "$RUN_CD" = "true" ]; then
            if [ "$DEPLOY_METHOD" = "COMMAND" ]; then
              SCOPE="none"
            elif [ "$EVENT" = "workflow_dispatch" ]; then
              SCOPE="selective"; COMMITS="$INPUT_COMMITS"
            elif [ "$EVENT" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
              SCOPE="full"
            elif [ "$EVENT" = "push" ]; then
              if [ "$DEPLOY_LAST_COMMITS" = "true" ]; then
                SCOPE="selective"; COMMITS="$PUSH_COMMITS"
              else
                SCOPE="full"
              fi
            fi
          fi

          echo "ACTION_TRIGGER=$ACTION_TRIGGER event=$EVENT ref_type=$REF_TYPE active=$ACTIVE pr=$PR"
          echo "run_ci=$RUN_CI run_cd=$RUN_CD method=$DEPLOY_METHOD scope=$SCOPE"
          {
            echo "run_ci=$RUN_CI"
            echo "run_cd=$RUN_CD"
            echo "scope=$SCOPE"
            echo "commits=$COMMITS"
          } >> "$GITHUB_OUTPUT"

  ci:
    needs: [get-branch, gate]
    if: ${{ needs.gate.outputs.run_ci == 'true' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.environment }}

    env:
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      CI_COMMAND: ${{ vars.CI_COMMAND }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        if: ${{ env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$BUILD_COMMAND"

      - name: Run CI command
        if: ${{ env.CI_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail
          eval "$CI_COMMAND"

  cd:
    needs: [get-branch, gate, ci]
    if: ${{ !failure() && !cancelled() && needs.gate.outputs.run_cd == 'true' }}
    runs-on: ubuntu-latest

    environment: ${{ needs.get-branch.outputs.environment }}

    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_LOCAL_DIR: ${{ vars.DEPLOY_LOCAL_DIR || './' }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DEPLOY_MIRROR: ${{ inputs.deploy_mirror || vars.DEPLOY_MIRROR || 'false' }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_METHOD: ${{ vars.DEPLOY_METHOD || 'COMMAND' }}
      BUILD_COMMAND: ${{ vars.BUILD_COMMAND }}
      BEFORE_DEPLOY_COMMAND: ${{ vars.BEFORE_DEPLOY_COMMAND }}
      AFTER_DEPLOY_COMMAND: ${{ vars.AFTER_DEPLOY_COMMAND }}
      SCOPE: ${{ needs.gate.outputs.scope }}
      COMMITS: ${{ needs.gate.outputs.commits }}

    steps:
      - name: Wait for release workflow
        if: ${{ github.ref_type == 'tag' }}
        uses: lewagon/wait-on-check-action@v1.8.0
        with:
          ref: ${{ github.ref }}
          check-regexp: '^(release|npm-publish|docker-publish)$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          allowed-conclusions: success,skipped
          wait-interval: 15
          fail-on-no-checks: false

      - name: Validate deploy mode
        shell: bash
        run: |
          set -euo pipefail
          if [ "$SCOPE" = "selective" ] && [ "$DEPLOY_METHOD" = "GIT" ]; then
            echo "::error::DEPLOY_METHOD=GIT is not supported in selective mode (workflow_dispatch with commits or DEPLOY_LAST_COMMITS=true). GIT deploys the whole branch, not a file subset."
            exit 1
          fi
          case "$DEPLOY_MIRROR" in
            false|true|full) ;;
            *) echo "::error::Invalid DEPLOY_MIRROR='$DEPLOY_MIRROR'. Allowed: false | true | full."; exit 1 ;;
          esac
          echo "Resolved: method=$DEPLOY_METHOD scope=$SCOPE mirror=$DEPLOY_MIRROR commits='$COMMITS'"

      - name: Setup SSH key
        if: ${{ env.DEPLOY_METHOD == 'RSYNC' || env.DEPLOY_METHOD == 'GIT' || env.DEPLOY_METHOD == 'COMMAND' }}
        shell: bash
        run: |
          TMP_KEY=$(mktemp)
          echo "$DEPLOY_KEY" > "$TMP_KEY"
          chmod 600 "$TMP_KEY"
          echo "TMP_KEY=$TMP_KEY" >> "$GITHUB_ENV"

      - name: Checkout
        if: ${{ env.SCOPE != 'none' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Resolve REF_COMMIT
        if: ${{ env.SCOPE == 'selective' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$COMMITS" ]; then
            REF_COMMIT=$(git rev-parse HEAD)
            echo "No commits specified — REF_COMMIT = HEAD = $REF_COMMIT"
          else
            readarray -t COMMITS_ARR < <(echo "$COMMITS" | tr ',; \t\r\n' '\n' | tr -s '\n' | grep -v '^[[:space:]]*$')
            REF_COMMIT=$(git log --no-walk --format='%ct %H' "${COMMITS_ARR[@]}" | sort -k1 -nr | head -1 | awk '{print $2}')
            echo "Resolved REF_COMMIT (latest by committer-date) = $REF_COMMIT"
          fi

          echo "REF_COMMIT=$REF_COMMIT" >> "$GITHUB_ENV"

          HEAD_COMMIT=$(git rev-parse HEAD)
          if [ "$REF_COMMIT" != "$HEAD_COMMIT" ]; then
            echo "Checking out REF_COMMIT (HEAD was $HEAD_COMMIT)"
            git checkout --force --detach "$REF_COMMIT"
          fi

      - name: Build
        if: ${{ env.SCOPE != 'none' && env.BUILD_COMMAND != '' }}
        shell: bash
        run: |
          set -euo pipefail

          npm ci

          eval "$BUILD_COMMAND"

      - name: Cache lftp
        if: ${{ env.DEPLOY_METHOD == 'FTP' }}
        id: cache-lftp
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-lftp-v2

      - name: Keep apt packages for caching
        if: ${{ env.DEPLOY_METHOD == 'FTP' }}
        shell: bash
        run: echo 'Binary::apt::APT::Keep-Downloaded-Packages "true";' | sudo tee /etc/apt/apt.conf.d/99keep-cache >/dev/null

      - name: Resolve changed files
        if: ${{ env.SCOPE == 'selective' }}
        shell: bash
        run: |
          set -euo pipefail

          UPLOAD_FILE="$RUNNER_TEMP/files_upload.txt"
          DELETE_FILE="$RUNNER_TEMP/files_delete.txt"
          ALL_FILES="$RUNNER_TEMP/all_files.txt"
          > "$UPLOAD_FILE"
          > "$DELETE_FILE"
          > "$ALL_FILES"

          LOCAL_DIR="${DEPLOY_LOCAL_DIR%/}"
          LOCAL_DIR="${LOCAL_DIR#./}"
          [ "$LOCAL_DIR" = "." ] && LOCAL_DIR=""

          if [ -z "$COMMITS" ]; then
            echo "=== Full deploy mode: collecting all paths ever touched in history ==="
            git log --pretty=format: --name-only | grep -v '^$' | sort -u > "$ALL_FILES" || true
          else
            readarray -t COMMITS_ARR < <(echo "$COMMITS" | tr ',; \t\r\n' '\n' | tr -s '\n' | grep -v '^[[:space:]]*$')
            for commit in "${COMMITS_ARR[@]}"; do
              commit="${commit// /}"
              [ -z "$commit" ] && continue
              echo "=== Processing commit: $commit ==="
              git diff-tree --no-commit-id -r --name-only "$commit" >> "$ALL_FILES"
            done
            sort -u -o "$ALL_FILES" "$ALL_FILES"
          fi

          echo "=== Candidate files: $(wc -l < "$ALL_FILES") ==="

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if [ -n "$LOCAL_DIR" ]; then
              [[ "$file" == "$LOCAL_DIR/"* ]] || continue
              rel="${file#"$LOCAL_DIR/"}"
            else
              rel="$file"
            fi

            if git cat-file -e "$REF_COMMIT:$file" 2>/dev/null; then
              echo "$rel" >> "$UPLOAD_FILE"
            else
              if [ "${DEPLOY_MIRROR}" = "true" ] || [ "${DEPLOY_MIRROR}" = "full" ]; then
                echo "$rel" >> "$DELETE_FILE"
              fi
            fi
          done < "$ALL_FILES"

          sort -u -o "$UPLOAD_FILE" "$UPLOAD_FILE"
          sort -u -o "$DELETE_FILE" "$DELETE_FILE"

          echo "--- Files to upload: $(wc -l < "$UPLOAD_FILE") ---"
          cat "$UPLOAD_FILE"
          echo "--- Files to delete: $(wc -l < "$DELETE_FILE") ---"
          cat "$DELETE_FILE"

          if ! [ -s "$UPLOAD_FILE" ] && ! [ -s "$DELETE_FILE" ]; then
            echo "::warning::No files match DEPLOY_LOCAL_DIR='${DEPLOY_LOCAL_DIR}'"
          fi

      - name: Before deploy command
        if: ${{ env.BEFORE_DEPLOY_COMMAND != '' && env.DEPLOY_METHOD != 'FTP' }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i "$TMP_KEY" -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            cd $DEPLOY_PATH
            $BEFORE_DEPLOY_COMMAND
          "

      - name: FTP deploy (full mirror)
        if: ${{ env.DEPLOY_METHOD == 'FTP' && env.SCOPE == 'full' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.cache-lftp.outputs.cache-hit }}" = "true" ] && ls /var/cache/apt/archives/lftp_*.deb &>/dev/null; then
            sudo dpkg -i /var/cache/apt/archives/lftp_*.deb || sudo apt-get install -f -y --no-install-recommends
          else
            sudo apt-get update -q
            sudo apt-get install -y --no-install-recommends lftp
          fi

          DELETE=""
          if [ "${DEPLOY_MIRROR}" = "full" ]; then
            DELETE="--delete"
          fi

          run_lftp_session() {
            local cmd_file="$1" max_retries="$2"
            {
              printf '%s\n' \
                "set net:timeout 30" \
                "set net:max-retries $max_retries" \
                "set net:reconnect-interval-base 5" \
                "set ftp:passive-mode true" \
                "set ssl:verify-certificate no" \
                "set ftp:list-options -a" \
                "set cmd:fail-exit true"
              cat "$cmd_file"
              echo "quit"
            } | lftp -u "$DEPLOY_USER,$DEPLOY_KEY" -p "$DEPLOY_PORT" "$DEPLOY_HOST"
          }

          run_lftp_single() {
            local cmd_file="$1" label="$2"
            local success=false
            for attempt in 1 2 3; do
              if run_lftp_session "$cmd_file" 1; then
                success=true
                break
              else
                echo "::warning::Per-file attempt $attempt/3 failed for '$label'"
              fi
            done
            if [ "$success" = "false" ]; then
              echo "::warning::Skipping '$label' after 3 failed attempts"
            fi
          }

          BATCH_CMD_FILE="$RUNNER_TEMP/lftp_batch_cmds.txt"
          BATCH_LOG="$RUNNER_TEMP/lftp_batch.log"
          printf '%s\n' "mirror -R --no-perms --parallel=2 --verbose --exclude-glob '.git*' $DELETE -x '(^|/)\.' \"$DEPLOY_LOCAL_DIR\" \"$DEPLOY_PATH\"" > "$BATCH_CMD_FILE"

          echo "Attempting batch mirror..."
          batch_ok=false
          for attempt in 1 2 3; do
            if run_lftp_session "$BATCH_CMD_FILE" 5 >"$BATCH_LOG" 2>&1; then
              cat "$BATCH_LOG"
              echo "Batch mirror succeeded on attempt $attempt"
              batch_ok=true
              break
            else
              echo "::warning::Batch mirror attempt $attempt/3 failed. lftp output:"
              cat "$BATCH_LOG"
            fi
          done

          if [ "$batch_ok" = "false" ]; then
            echo "Falling back to per-file upload..."
            LOCAL_DIR="${DEPLOY_LOCAL_DIR%/}"
            LOCAL_DIR="${LOCAL_DIR#./}"
            [ "$LOCAL_DIR" = "." ] && LOCAL_DIR=""
            SRC_BASE="${LOCAL_DIR:-.}"

            SINGLE_CMD_FILE="$RUNNER_TEMP/lftp_single_cmd.txt"
            while IFS= read -r local_path; do
              rel_path="${local_path#./}"
              [ -n "$LOCAL_DIR" ] && rel_path="${rel_path#"$LOCAL_DIR/"}"
              file_dir=$(dirname "$rel_path")
              if [ "$file_dir" = "." ]; then
                remote_dir="$DEPLOY_PATH"
              else
                remote_dir="$DEPLOY_PATH/$file_dir"
              fi
              printf '%s\n' "mkdir -fp \"$remote_dir\"" "put -O \"$remote_dir\" \"$local_path\"" > "$SINGLE_CMD_FILE"
              run_lftp_single "$SINGLE_CMD_FILE" "$rel_path"
            done < <(find "$SRC_BASE" \( -name '.git' -prune \) -o -type f -print)
          fi

      - name: FTP deploy (selective)
        if: ${{ env.DEPLOY_METHOD == 'FTP' && env.SCOPE == 'selective' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.cache-lftp.outputs.cache-hit }}" = "true" ] && ls /var/cache/apt/archives/lftp_*.deb &>/dev/null; then
            sudo dpkg -i /var/cache/apt/archives/lftp_*.deb || sudo apt-get install -f -y --no-install-recommends
          else
            sudo apt-get update -q
            sudo apt-get install -y --no-install-recommends lftp
          fi

          LOCAL_DIR="${DEPLOY_LOCAL_DIR%/}"
          LOCAL_DIR="${LOCAL_DIR#./}"
          [ "$LOCAL_DIR" = "." ] && LOCAL_DIR=""

          run_lftp_session() {
            local cmd_file="$1" max_retries="$2"
            {
              printf '%s\n' \
                "set net:timeout 30" \
                "set net:max-retries $max_retries" \
                "set net:reconnect-interval-base 5" \
                "set ftp:passive-mode true" \
                "set ssl:verify-certificate no" \
                "set ftp:list-options -a" \
                "set cmd:fail-exit true"
              cat "$cmd_file"
              echo "quit"
            } | lftp -u "$DEPLOY_USER,$DEPLOY_KEY" -p "$DEPLOY_PORT" "$DEPLOY_HOST"
          }

          run_lftp_single() {
            local cmd_file="$1" label="$2"
            local success=false
            for attempt in 1 2 3; do
              if run_lftp_session "$cmd_file" 1; then
                success=true
                break
              else
                echo "::warning::Per-file attempt $attempt/3 failed for '$label'"
              fi
            done
            if [ "$success" = "false" ]; then
              echo "::warning::Skipping '$label' after 3 failed attempts"
            fi
          }

          BATCH_CMD_FILE="$RUNNER_TEMP/lftp_batch_cmds.txt"
          BATCH_LOG="$RUNNER_TEMP/lftp_batch.log"

          UPLOAD_FILE="$RUNNER_TEMP/files_upload.txt"
          DELETE_FILE="$RUNNER_TEMP/files_delete.txt"

          if [ -s "$UPLOAD_FILE" ]; then
            > "$BATCH_CMD_FILE"
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              if [ -z "$LOCAL_DIR" ]; then
                src_path="./$file"
              else
                src_path="./$LOCAL_DIR/$file"
              fi
              file_dir=$(dirname "$file")
              if [ "$file_dir" = "." ]; then
                remote_dir="$DEPLOY_PATH"
              else
                remote_dir="$DEPLOY_PATH/$file_dir"
              fi
              echo "mkdir -fp \"$remote_dir\"" >> "$BATCH_CMD_FILE"
              echo "put -O \"$remote_dir\" \"$src_path\"" >> "$BATCH_CMD_FILE"
            done < "$UPLOAD_FILE"

            echo "Attempting batch upload..."
            batch_ok=false
            for attempt in 1 2 3; do
              if run_lftp_session "$BATCH_CMD_FILE" 5 >"$BATCH_LOG" 2>&1; then
                cat "$BATCH_LOG"
                echo "Batch upload succeeded on attempt $attempt"
                batch_ok=true
                break
              else
                echo "::warning::Batch upload attempt $attempt/3 failed. lftp output:"
                cat "$BATCH_LOG"
              fi
            done

            if [ "$batch_ok" = "false" ]; then
              echo "Falling back to per-file upload..."
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                if [ -z "$LOCAL_DIR" ]; then
                  src_path="./$file"
                else
                  src_path="./$LOCAL_DIR/$file"
                fi
                file_dir=$(dirname "$file")
                if [ "$file_dir" = "." ]; then
                  remote_dir="$DEPLOY_PATH"
                else
                  remote_dir="$DEPLOY_PATH/$file_dir"
                fi
                SINGLE_CMD_FILE="$RUNNER_TEMP/lftp_single_cmd.txt"
                printf '%s\n' "mkdir -fp \"$remote_dir\"" "put -O \"$remote_dir\" \"$src_path\"" > "$SINGLE_CMD_FILE"
                run_lftp_single "$SINGLE_CMD_FILE" "$file"
              done < "$UPLOAD_FILE"
            fi
          fi

          if [ -s "$DELETE_FILE" ]; then
            > "$BATCH_CMD_FILE"
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              echo "rm -f \"$DEPLOY_PATH/$file\"" >> "$BATCH_CMD_FILE"
            done < "$DELETE_FILE"

            echo "Attempting batch delete..."
            batch_ok=false
            for attempt in 1 2 3; do
              if run_lftp_session "$BATCH_CMD_FILE" 5 >"$BATCH_LOG" 2>&1; then
                cat "$BATCH_LOG"
                echo "Batch delete succeeded on attempt $attempt"
                batch_ok=true
                break
              else
                echo "::warning::Batch delete attempt $attempt/3 failed. lftp output:"
                cat "$BATCH_LOG"
              fi
            done

            if [ "$batch_ok" = "false" ]; then
              echo "Falling back to per-file delete..."
              while IFS= read -r file; do
                [ -z "$file" ] && continue
                SINGLE_CMD_FILE="$RUNNER_TEMP/lftp_single_cmd.txt"
                printf '%s\n' "rm -f \"$DEPLOY_PATH/$file\"" > "$SINGLE_CMD_FILE"
                run_lftp_single "$SINGLE_CMD_FILE" "$file"
              done < "$DELETE_FILE"
            fi
          fi

      - name: RSYNC deploy (full)
        if: ${{ env.DEPLOY_METHOD == 'RSYNC' && env.SCOPE == 'full' }}
        shell: bash
        run: |
          set -euo pipefail

          DELETE=""
          if [ "${DEPLOY_MIRROR}" = "full" ]; then
            DELETE="--delete"
          fi

          attempt_rsync() {
            local rc
            for attempt in 1 2 3; do
              if rsync "$@"; then return 0; fi
              rc=$?
              echo "::warning::rsync attempt $attempt/3 failed (exit $rc); retrying in 5s..."
              sleep 5
            done
            echo "::error::rsync failed after 3 attempts (last exit $rc)"
            return 1
          }

          attempt_rsync -avz --progress --timeout=30 $DELETE \
            -e "ssh -i $TMP_KEY -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -p $DEPLOY_PORT" \
            --exclude='.*' \
            --no-perms --no-owner --no-group \
            --omit-dir-times \
            --keep-dirlinks \
            "$DEPLOY_LOCAL_DIR/" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"

      - name: RSYNC deploy (selective)
        if: ${{ env.DEPLOY_METHOD == 'RSYNC' && env.SCOPE == 'selective' }}
        shell: bash
        run: |
          set -euo pipefail

          LOCAL_DIR="${DEPLOY_LOCAL_DIR%/}"
          LOCAL_DIR="${LOCAL_DIR#./}"
          [ "$LOCAL_DIR" = "." ] && LOCAL_DIR=""

          UPLOAD_FILE="$RUNNER_TEMP/files_upload.txt"
          DELETE_FILE="$RUNNER_TEMP/files_delete.txt"

          if [ -z "$LOCAL_DIR" ]; then
            SRC_DIR="./"
          else
            SRC_DIR="$LOCAL_DIR/"
          fi

          attempt_rsync() {
            local rc
            for attempt in 1 2 3; do
              if rsync "$@"; then return 0; fi
              rc=$?
              echo "::warning::rsync attempt $attempt/3 failed (exit $rc); retrying in 5s..."
              sleep 5
            done
            echo "::error::rsync failed after 3 attempts (last exit $rc)"
            return 1
          }

          if [ -s "$UPLOAD_FILE" ]; then
            attempt_rsync -avz --progress --timeout=30 \
              -e "ssh -i $TMP_KEY -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -p $DEPLOY_PORT" \
              --files-from="$UPLOAD_FILE" \
              --ignore-missing-args \
              --no-perms --no-owner --no-group \
              --omit-dir-times \
              --keep-dirlinks \
              "$SRC_DIR" "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
          else
            echo "No files to upload."
          fi

          if { [ "${DEPLOY_MIRROR}" = "true" ] || [ "${DEPLOY_MIRROR}" = "full" ]; } && [ -s "$DELETE_FILE" ]; then
            while IFS= read -r file; do
              [ -z "$file" ] && continue
              ssh -i "$TMP_KEY" \
                -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -p "$DEPLOY_PORT" \
                "$DEPLOY_USER@$DEPLOY_HOST" "rm -f \"$DEPLOY_PATH/$file\""
            done < "$DELETE_FILE"
          fi

      - name: GIT deploy
        if: ${{ env.DEPLOY_METHOD == 'GIT' }}
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i "$TMP_KEY" -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST "
            cd $DEPLOY_PATH
            if [ ! -d '.git' ]; then
              git clone --branch ${GITHUB_REF_NAME} git@github.com:${GITHUB_REPOSITORY}.git .
            else
              if [ "${DEPLOY_MIRROR}" = "full" ]; then
                git fetch origin ${GITHUB_REF_NAME}
                git reset --hard origin/${GITHUB_REF_NAME}
              else
                git pull origin ${GITHUB_REF_NAME}
              fi
            fi
          "

      - name: After deploy command
        if: ${{ env.AFTER_DEPLOY_COMMAND != '' && env.DEPLOY_METHOD != 'FTP' }}
        shell: bash
        run: |
          set -euo pipefail

          ssh -i "$TMP_KEY" -o StrictHostKeyChecking=no -o BatchMode=yes -o ConnectTimeout=30 -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "
            cd $DEPLOY_PATH
            $AFTER_DEPLOY_COMMAND
          "

      - name: Cleanup SSH key
        if: always()
        shell: bash
        run: |
          [ -n "${TMP_KEY:-}" ] && [ -f "$TMP_KEY" ] && rm -f "$TMP_KEY" || true